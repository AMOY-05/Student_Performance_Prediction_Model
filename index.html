<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Predictor</title>
</head>
<body>

    <h2>Student Performance Prediction</h2>
    
    <form method="POST">
    Age: <input type="number" name="age" required><br><br>
    Study Time: <input type="number" name="studytime" required><br><br>
    Failures: <input type="number" name="failures" required><br><br>
    Absences: <input type="number" name="absences" required><br><br>

    <input type="submit" value="Predict">
</form>

{% if prediction %}
    <h3>Result: {{ prediction }}</h3>
{% endif %}

    
</body>
</html>
